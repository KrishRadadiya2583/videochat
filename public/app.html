<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <div class="app" id="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="side-head">
        <div class="brand small">
          <div class="brand-mark">
            <svg viewBox="0 0 24 24" fill="none"><path d="M12 21C16.9706 21 21 16.9706 21 12C21 7.02944 16.9706 3 12 3C7.02944 3 3 7.02944 3 12C3 13.4876 3.36093 14.891 4 16.1272L3 21L7.8728 20C9.10898 20.6391 10.5124 21 12 21Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" /></svg>
          </div>
          <span>Connect</span>
        </div>
        <div class="side-actions">
          <button id="newDmBtn" class="icon-btn" title="New Direct Message">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button id="newGroupBtn" class="icon-btn" title="New Group">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75M12 11a4 4 0 100-8 4 4 0 000 8z" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>

      <div class="side-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <input id="convFilter" type="text" placeholder="Search conversations" />
      </div>

      <div class="conv-list" id="convList">
        <div class="side-empty">Loading…</div>
      </div>

      <div class="side-foot" id="sideFoot">
        <div class="me" id="me"></div>
        <button id="logoutBtn" class="icon-btn" title="Log out">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" stroke-linecap="round" stroke-linejoin="round" /></svg>
        </button>
      </div>
    </aside>

    <!-- Main -->
    <main class="chat" id="chat">
      <section class="chat-empty" id="chatEmpty">
        <div class="empty-content">
          <div class="empty-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <h2>Select a conversation</h2>
          <p>Start a new direct message or group to begin chatting.</p>
        </div>
      </section>

      <section class="chat-active hidden" id="chatActive">
        <header class="chat-head">
          <button id="menuToggle" class="icon-btn mobile-only" title="Menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16" stroke-linecap="round" stroke-linejoin="round" /></svg>
          </button>
          <div class="chat-head-info">
            <div class="avatar" id="chatAvatar"></div>
            <div>
              <div class="chat-title" id="chatTitle"></div>
              <div class="chat-sub" id="chatSub"></div>
            </div>
          </div>
          <div class="chat-head-actions">
            <button id="audioCallBtn" class="icon-btn" title="Audio call">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" stroke-linecap="round" stroke-linejoin="round" /></svg>
            </button>
            <button id="videoCallBtn" class="icon-btn" title="Video call">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" /></svg>
            </button>
            <button id="infoBtn" class="icon-btn" title="Details">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" /></svg>
            </button>
          </div>
        </header>

        <div class="chat-scroll" id="chatScroll">
          <button class="load-more hidden" id="loadMoreBtn">Load older messages</button>
          <div class="messages" id="messages"></div>
          <div class="typing" id="typing"></div>
        </div>

        <div id="replyingTo" class="replying-to hidden"></div>

        <div class="composer">
          <button id="attachBtn" class="icon-btn" title="Attach file">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" stroke-linecap="round" stroke-linejoin="round" /></svg>
          </button>
          <input type="file" id="fileInput" hidden />
          <div class="composer-input-wrap">
            <div id="attachPreview" class="attach-preview hidden"></div>
            <textarea id="msgInput" placeholder="Message" rows="1" maxlength="4000"></textarea>
          </div>
          <button id="emojiBtn" class="icon-btn" title="Emoji">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22a10 10 0 100-20 10 10 0 000 20zM8 14s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01" stroke-linecap="round" stroke-linejoin="round" /></svg>
          </button>
          <button id="sendBtn" class="send-btn" title="Send">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke-linecap="round" stroke-linejoin="round" /></svg>
          </button>
        </div>
      </section>

      <!-- Right-side info panel -->
      <aside class="details hidden" id="details">
        <header class="details-head">
          <h3>Details</h3>
          <button id="closeDetailsBtn" class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" /></svg></button>
        </header>
        <div class="details-body" id="detailsBody"></div>
      </aside>
    </main>
  </div>

  <!-- Emoji picker -->
  <div id="emojiPicker" class="emoji-picker hidden">
    <div class="emoji-picker-head">
      <input id="emojiSearch" type="text" placeholder="Search emoji…" />
    </div>
    <div class="emoji-tabs" id="emojiTabs"></div>
    <div class="emoji-body" id="emojiBody"></div>
  </div>

  <!-- Reaction picker -->
  <div id="reactionPicker" class="reaction-picker hidden">
    <span>👍</span><span>❤️</span><span>😂</span><span>😮</span><span>😢</span><span>🙏</span><span>🎉</span><span>🔥</span>
  </div>

  <!-- Message context menu -->
  <div id="msgMenu" class="msg-menu hidden">
    <button data-action="reply">Reply</button>
    <button data-action="react">React</button>
    <button data-action="edit">Edit</button>
    <button data-action="delete" class="danger">Delete</button>
  </div>

  <!-- New DM Modal -->
  <div id="newDmModal" class="modal hidden">
    <div class="modal-card">
      <header class="modal-head"><h3>New direct message</h3><button class="icon-btn modal-close" data-close><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" /></svg></button></header>
      <div class="modal-body">
        <input id="dmSearch" type="text" placeholder="Search users..." />
        <div id="dmResults" class="user-results"></div>
      </div>
    </div>
  </div>

  <!-- New Group Modal -->
  <div id="newGroupModal" class="modal hidden">
    <div class="modal-card">
      <header class="modal-head"><h3>New group</h3><button class="icon-btn modal-close" data-close><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" /></svg></button></header>
      <div class="modal-body">
        <input id="groupName" type="text" placeholder="Group name" maxlength="60" />
        <input id="groupSearch" type="text" placeholder="Add members by username..." />
        <div id="groupResults" class="user-results"></div>
        <div id="groupSelected" class="chip-row"></div>
      </div>
      <footer class="modal-foot">
        <button class="btn-ghost" data-close>Cancel</button>
        <button id="createGroupBtn" class="btn-primary small"><span>Create</span></button>
      </footer>
    </div>
  </div>

  <!-- Incoming call modal -->
  <div id="incomingCallModal" class="modal hidden">
    <div class="modal-card">
      <header class="modal-head"><h3>Incoming call</h3></header>
      <div class="modal-body center">
        <div class="ring-avatar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-linecap="round" stroke-linejoin="round" /></svg></div>
        <p id="callerLabel">Someone is calling…</p>
      </div>
      <footer class="modal-foot">
        <button id="rejectCallBtn" class="btn-ghost danger">Decline</button>
        <button id="acceptCallBtn" class="btn-primary small"><span>Accept</span></button>
      </footer>
    </div>
  </div>

  <!-- Call surface -->
  <div id="callSurface" class="call-surface hidden">
    <div class="call-header">
      <div class="call-title" id="callTitle">Call</div>
      <div class="call-participants" id="callParticipants">0</div>
    </div>
    <div id="videoGrid" class="video-grid"></div>
    <div class="call-controls">
      <button id="toggleMicBtn" class="ctrl-btn" title="Mute"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" stroke-linecap="round" stroke-linejoin="round" /></svg></button>
      <button id="toggleVideoBtn" class="ctrl-btn" title="Camera"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" /></svg></button>
      <button id="screenShareBtn" class="ctrl-btn" title="Share screen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="12" rx="2" ry="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 20h8M12 16v4" stroke-linecap="round" stroke-linejoin="round" /></svg></button>
      <button id="hangUpBtn" class="ctrl-btn hangup" title="End call"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3a2 2 0 00-2 2v1c0 8.284 6.716 15 15 15h1a2 2 0 002-2v-3.28a1 1 0 00-.684-.948l-4.493-1.498a1 1 0 00-1.21.502l-1.13 2.257a11.042 11.042 0 01-5.516-5.516l2.257-1.13a1 1 0 00.502-1.21L9.228 3.683A1 1 0 008.279 3H5z" stroke-linecap="round" stroke-linejoin="round" /></svg></button>
    </div>
  </div>

  <!-- Toasts -->
  <div id="toasts" class="toasts"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/call.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
